<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OCR 图片识字 —— 纯前端图片文字识别，支持中英文，基于 tesseract.js，全部本地处理" />
  <title>OCR 图片识字 - 网页工具箱</title>
  <link rel="icon" type="image/svg+xml" href="/local-toolbox/favicon.svg" />
  <script type="module" crossorigin src="/local-toolbox/assets/ocr-nokVuXX4.js"></script>
  <link rel="modulepreload" crossorigin href="/local-toolbox/assets/rolldown-runtime-DAXXjFlN.js">
  <link rel="modulepreload" crossorigin href="/local-toolbox/assets/common-fvDkMcza.js">
  <link rel="modulepreload" crossorigin href="/local-toolbox/assets/preload-helper-CHq0b4Vy.js">
  <link rel="stylesheet" crossorigin href="/local-toolbox/assets/common-BF3WOA9q.css">
  <link rel="stylesheet" crossorigin href="/local-toolbox/assets/ocr-C4ccllyX.css">
</head>
<body>
  <main class="tool-container">
    <!-- 描述 -->
    <section class="glass panel-section">
      <div class="panel-desc">纯前端 OCR 图片文字识别，基于 tesseract.js。支持中文简体、繁体、英文识别，识别过程完全在浏览器本地完成，图片不上传服务器。第一次使用需从 CDN 下载语言数据。</div>
    </section>

    <!-- 输入区 -->
    <section class="glass panel-section">
      <div class="codec-row">
        <label class="codec-label">图片输入</label>
        <div class="hash-dropzone" id="ocr-dropzone" tabindex="0">
          <svg class="hash-dropzone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <div class="hash-dropzone__text">
            <span class="hash-dropzone__primary">拖入图片 / 点击选择 / Ctrl+V 粘贴</span>
            <span class="hash-dropzone__secondary" id="ocr-file-name">支持 PNG / JPG / WebP / BMP / GIF</span>
          </div>
          <input type="file" id="ocr-file" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif" hidden />
        </div>
      </div>
      <div class="ocr-preview" id="ocr-preview" hidden>
        <img id="ocr-preview-img" alt="预览" />
        <div class="ocr-preview__meta">
          <span id="ocr-file-info"></span>
          <button class="meta-btn" id="btn-ocr-remove">移除</button>
        </div>
      </div>
    </section>

    <!-- 选项区 -->
    <section class="glass panel-section">
      <div class="ocr-options">
        <div class="codec-row">
          <label class="codec-label" for="ocr-lang">识别语言</label>
          <select class="codec-select" id="ocr-lang">
            <option value="chi_sim+eng" selected>中文 + 英文</option>
            <option value="eng">仅英文</option>
            <option value="chi_sim">仅中文（简体）</option>
            <option value="chi_sim+chi_tra+eng">中文简体+繁体+英文</option>
          </select>
        </div>
        <div class="codec-row">
          <label class="codec-label" for="ocr-oem">引擎模式</label>
          <select class="codec-select" id="ocr-oem">
            <option value="1" selected>LSTM_ONLY（推荐）</option>
            <option value="0">TESSERACT_ONLY</option>
            <option value="2">TESSERACT_LSTM_COMBINED</option>
          </select>
        </div>
      </div>
      <div class="codec-actions">
        <button class="btn btn-primary" id="btn-ocr-start" disabled>开始识别</button>
        <button class="btn btn-secondary" id="btn-ocr-cancel" hidden>取消</button>
      </div>
    </section>

    <!-- 进度区 -->
    <section class="glass progress-section" id="ocr-progress" hidden>
      <div class="progress-stage__header">
        <span class="progress-stage__title" id="ocr-progress-title">准备中</span>
        <span class="progress-stage__pct" id="ocr-progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="ocr-progress-fill"></div>
      </div>
      <div class="progress-stage__status" id="ocr-progress-status">等待开始</div>
    </section>

    <!-- 结果区 -->
    <section class="glass panel-section" id="ocr-result" hidden>
      <div class="codec-row">
        <label class="codec-label">识别结果</label>
        <textarea class="codec-input" id="ocr-text" rows="10" placeholder="识别结果将显示在此处（可编辑）"></textarea>
      </div>
      <div class="ocr-meta">
        <span>置信度：<strong id="ocr-confidence">--</strong></span>
      </div>
      <div class="codec-actions">
        <button class="meta-btn" id="btn-ocr-copy">复制</button>
        <button class="meta-btn" id="btn-ocr-download">下载 .txt</button>
        <button class="btn btn-secondary" id="btn-ocr-clear">清空</button>
      </div>
    </section>
  </main>

</body>
</html>
