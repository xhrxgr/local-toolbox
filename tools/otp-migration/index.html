<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TOTP 迁移 —— 解析 Google Authenticator 导出二维码，生成标准 otpauth:// 链接，实时验证码，全部本地离线运行" />
  <title>TOTP 迁移 - 网页工具箱</title>
  <link rel="icon" type="image/svg+xml" href="/local-toolbox/favicon.svg" />
  <script type="module" crossorigin src="/local-toolbox/assets/otpMigration-6axZQzSP.js"></script>
  <link rel="modulepreload" crossorigin href="/local-toolbox/assets/jsQR-Dry46kJz.js">
  <link rel="modulepreload" crossorigin href="/local-toolbox/assets/common-fvDkMcza.js">
  <link rel="stylesheet" crossorigin href="/local-toolbox/assets/common-BF3WOA9q.css">
  <link rel="stylesheet" crossorigin href="/local-toolbox/assets/otpMigration-khUFTyrN.css">
</head>
<body>
  <main class="totp-container">
    <!-- 安全提示 -->
    <div class="safety-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      本页面完全离线运行，密钥不会上传、不会写入本地存储，刷新即清空
    </div>

    <!-- 输入区 -->
    <section class="input-section glass">
      <p class="input-section__desc">粘贴 Google Authenticator 导出链接（otpauth-migration:// 开头），每行一个。<strong>支持多批二维码合并解析。</strong>也可以拖入导出二维码的截图自动识别。</p>
      <textarea class="input-textarea" id="input-text" placeholder="otpauth-migration://offline?data=..." rows="4"></textarea>

      <div class="drop-zone" id="drop-zone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        拖入导出二维码截图，或点击选择图片（也可 Ctrl+V 粘贴）
        <input type="file" id="img-input" accept="image/png,image/jpeg,image/gif,image/bmp,image/webp" multiple hidden />
      </div>

      <div class="input-actions">
        <button class="btn btn-primary" id="btn-parse">解析</button>
      </div>
    </section>

    <!-- 结果区 -->
    <section class="results-section glass" id="results-section" hidden>
      <div class="results-header">
        <h3>解析结果</h3>
      </div>
      <div class="results-empty" id="results-empty" hidden>暂无解析结果</div>
      <div class="accounts-list" id="accounts-list"></div>
      <div class="results-actions" id="results-actions" hidden>
        <button class="btn btn-primary btn-sm" id="btn-download">下载 txt（ente 导入格式）</button>
        <button class="btn btn-secondary btn-sm" id="btn-clear">清空数据</button>
      </div>
    </section>

    <!-- 二维码弹窗 -->
    <div class="qr-overlay" id="qr-overlay" hidden>
      <div class="qr-modal">
        <div class="qr-modal__header">
          <h3>扫描此二维码导入</h3>
          <button class="qr-modal__close" id="qr-overlay-close" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <canvas class="qr-modal__canvas" id="qr-canvas"></canvas>
        <p class="qr-modal__url" id="qr-url-text"></p>
      </div>
    </div>
  </main>

</body>
</html>
