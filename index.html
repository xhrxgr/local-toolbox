<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="网页工具箱 —— 本地处理、隐私安全的在线工具集合" />
  <title>网页工具箱</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/global.css" />
  <style>
    /* 首页专属样式 */
    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-xl) var(--space-lg) var(--space-lg);
      max-width: 1200px;
      margin: 0 auto;
    }

    .home-header__title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-2xl);
      font-weight: 700;
    }

    .home-header__title svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    /* 分类筛选 */
    .filter {
      display: flex;
      gap: var(--space-sm);
      padding: 0 var(--space-lg) var(--space-lg);
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter__item {
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-xl);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--card);
      border: 1px solid var(--border);
      transition: all var(--transition-fast);
    }

    .filter__item:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .filter__item--active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    /* 工具网格 */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-lg);
      padding: 0 var(--space-lg) var(--space-3xl);
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 工具卡片 */
    .tool-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      padding: var(--space-xl);
      border-radius: var(--radius-lg);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal),
        border-color var(--transition-normal);
      cursor: pointer;
    }

    .tool-card:not(.tool-card--disabled):hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-hover);
      background: var(--card-hover);
    }

    .tool-card--disabled {
      opacity: var(--disabled-opacity);
      cursor: not-allowed;
      pointer-events: none;
    }

    .tool-card__icon {
      width: 48px;
      height: 48px;
      color: var(--accent);
    }

    .tool-card__icon svg {
      width: 100%;
      height: 100%;
    }

    .tool-card__name {
      font-size: var(--text-lg);
      font-weight: 600;
    }

    .tool-card__desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .tool-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-top: auto;
    }

    .tag {
      font-size: var(--text-xs);
      padding: 2px var(--space-sm);
      border-radius: var(--radius-xl);
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: 500;
    }

    /* 渐变背景装饰 */
    .bg-decoration {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        ellipse at 30% 20%,
        rgba(99, 102, 241, 0.08) 0%,
        transparent 50%
      ),
      radial-gradient(
        ellipse at 70% 80%,
        rgba(129, 140, 248, 0.06) 0%,
        transparent 50%
      );
      pointer-events: none;
      z-index: -1;
    }

    /* ============================================================
     * 搜索栏 - 优雅毛玻璃风格
     * ============================================================ */
    .search-section {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 var(--space-lg) var(--space-xl);
      position: relative;
    }

    .search-box {
      position: relative;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      transition: border-color var(--transition-fast),
        box-shadow var(--transition-fast),
        background var(--transition-fast);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
    }

    .search-input-wrapper:hover {
      border-color: var(--border-hover);
    }

    .search-input-wrapper:focus-within {
      border-color: var(--accent);
      background: var(--card-hover);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12),
        0 4px 20px rgba(99, 102, 241, 0.08);
    }

    .search-icon {
      position: absolute;
      left: var(--space-md);
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
      pointer-events: none;
      transition: color var(--transition-fast);
    }

    .search-input-wrapper:focus-within .search-icon {
      color: var(--accent);
    }

    .search-input {
      flex: 1;
      padding: var(--space-md) var(--space-md) var(--space-md) calc(var(--space-md) * 2 + 24px);
      background: transparent;
      border: none;
      outline: none;
      font-size: var(--text-base);
      color: var(--text);
      font-family: inherit;
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-shortcut {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      margin-right: var(--space-sm);
      font-size: var(--text-xs);
      font-family: ui-monospace, 'SF Mono', Monaco, monospace;
      color: var(--text-secondary);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      pointer-events: none;
      transition: opacity var(--transition-fast);
    }

    .search-input-wrapper:focus-within .search-shortcut {
      opacity: 0;
    }

    /* 下拉建议面板 */
    .search-suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      overflow: hidden;
      z-index: 100;
      max-height: 480px;
      overflow-y: auto;
      animation: suggestions-appear 0.15s ease-out;
    }

    @keyframes suggestions-appear {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-suggestions[hidden] {
      display: none;
    }

    .search-suggestion {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition-fast);
      cursor: pointer;
    }

    .search-suggestion:last-child {
      border-bottom: none;
    }

    .search-suggestion:hover,
    .search-suggestion--active {
      background: var(--card-hover);
    }

    .search-suggestion--active {
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .search-suggestion__icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      padding: 6px;
      color: var(--accent);
      background: var(--tag-bg);
      border-radius: var(--radius-md);
    }

    .search-suggestion__icon svg {
      width: 100%;
      height: 100%;
    }

    .search-suggestion__body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .search-suggestion__header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    .search-suggestion__name {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--text);
    }

    .search-suggestion__category {
      font-size: var(--text-xs);
      padding: 1px 8px;
      border-radius: var(--radius-xl);
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: 500;
    }

    .search-suggestion__score {
      margin-left: auto;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, 'SF Mono', Monaco, monospace;
    }

    .search-suggestion__desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .search-suggestion__tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .search-suggestion__tag {
      font-size: 11px;
      padding: 0 6px;
      border-radius: var(--radius-sm);
      background: var(--tag-bg);
      color: var(--tag-text);
    }

    .search-suggestion mark {
      background: rgba(99, 102, 241, 0.18);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
      font-weight: 600;
    }

    .search-suggestion--empty {
      padding: var(--space-xl) var(--space-lg);
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
      color: var(--text-secondary);
      text-align: center;
      cursor: default;
    }

    .search-suggestion--empty svg {
      width: 32px;
      height: 32px;
      opacity: 0.4;
    }

    .search-suggestion--empty:hover {
      background: transparent;
    }

    /* 移动端适配 */
    @media (max-width: 640px) {
      .search-section {
        padding: 0 var(--space-md) var(--space-lg);
      }
      .search-suggestion__desc {
        display: none;
      }
      .search-suggestion__tags {
        display: none;
      }
      .search-shortcut {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-decoration"></div>

  <header class="home-header">
    <div class="home-header__title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      网页工具箱
    </div>
    <button class="theme-toggle" aria-label="切换主题" onclick="toggleTheme()">🌙</button>
  </header>

  <section class="search-section">
    <div class="search-box">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="搜索工具，如「视频转换」「二维码」「ffmpeg」…"
          autocomplete="off"
          spellcheck="false"
          aria-label="搜索工具"
          aria-expanded="false"
          aria-controls="search-suggestions"
        >
        <kbd class="search-shortcut">/</kbd>
      </div>
      <div id="search-suggestions" class="search-suggestions" role="listbox" hidden></div>
    </div>
  </section>

  <div class="filter">
    <button class="filter__item filter__item--active" data-filter="all">全部</button>
    <button class="filter__item" data-filter="media">媒体</button>
    <button class="filter__item" data-filter="time">时间</button>
    <button class="filter__item" data-filter="network">网络</button>
    <button class="filter__item" data-filter="encoding">编码</button>
    <button class="filter__item" data-filter="dev">开发</button>
    <button class="filter__item" data-filter="util">实用</button>
  </div>

  <div class="tools-grid" id="tools-grid"></div>

  <script type="module" src="/assets/js/common.js"></script>
  <script type="module" src="/assets/js/tools.js"></script>
</body>
</html>
