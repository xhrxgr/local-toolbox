<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="网页工具箱 —— 本地处理、隐私安全的在线工具集合" />
  <title>网页工具箱</title>
  <link rel="icon" type="image/svg+xml" href="/local-toolbox/favicon.svg" />
  <style>
    /* 首页专属样式 */
    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-xl) var(--space-lg) var(--space-lg);
      max-width: 1200px;
      margin: 0 auto;
    }

    .home-header__title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-2xl);
      font-weight: 700;
    }

    .home-header__title svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    /* 分类筛选 */
    .filter {
      display: flex;
      gap: var(--space-sm);
      padding: 0 var(--space-lg) var(--space-lg);
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter__item {
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-xl);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--card);
      border: 1px solid var(--border);
      transition: all var(--transition-fast);
    }

    .filter__item:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .filter__item--active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    /* 工具网格 */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-lg);
      padding: 0 var(--space-lg) var(--space-3xl);
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 工具卡片 */
    .tool-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      padding: var(--space-xl);
      border-radius: var(--radius-lg);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal),
        border-color var(--transition-normal);
      cursor: pointer;
    }

    .tool-card:not(.tool-card--disabled):hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-hover);
      background: var(--card-hover);
    }

    .tool-card--disabled {
      opacity: var(--disabled-opacity);
      cursor: not-allowed;
      pointer-events: none;
    }

    .tool-card__icon {
      width: 48px;
      height: 48px;
      color: var(--accent);
    }

    .tool-card__icon svg {
      width: 100%;
      height: 100%;
    }

    .tool-card__name {
      font-size: var(--text-lg);
      font-weight: 600;
    }

    .tool-card__desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .tool-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-top: auto;
    }

    .tag {
      font-size: var(--text-xs);
      padding: 2px var(--space-sm);
      border-radius: var(--radius-xl);
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: 500;
    }

    /* 渐变背景装饰 */
    .bg-decoration {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        ellipse at 30% 20%,
        rgba(99, 102, 241, 0.08) 0%,
        transparent 50%
      ),
      radial-gradient(
        ellipse at 70% 80%,
        rgba(129, 140, 248, 0.06) 0%,
        transparent 50%
      );
      pointer-events: none;
      z-index: -1;
    }
  </style>
  <script type="module" crossorigin src="/local-toolbox/assets/main-D2h2F7YR.js"></script>
  <link rel="modulepreload" crossorigin href="/local-toolbox/assets/common-fvDkMcza.js">
  <link rel="stylesheet" crossorigin href="/local-toolbox/assets/common-BF3WOA9q.css">
</head>
<body>
  <div class="bg-decoration"></div>

  <header class="home-header">
    <div class="home-header__title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      网页工具箱
    </div>
    <button class="theme-toggle" aria-label="切换主题" onclick="toggleTheme()">🌙</button>
  </header>

  <div class="filter">
    <button class="filter__item filter__item--active" data-filter="all">全部</button>
    <button class="filter__item" data-filter="media">媒体</button>
    <button class="filter__item" data-filter="time">时间</button>
    <button class="filter__item" data-filter="network">网络</button>
    <button class="filter__item" data-filter="encoding">编码</button>
  </div>

  <div class="tools-grid" id="tools-grid"></div>

</body>
</html>
